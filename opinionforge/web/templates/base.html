<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OpinionForge{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a href="/" class="brand">OpinionForge</a>
            <ul class="nav-links">
                <li><a href="/"{% if current_page == 'home' %} class="active"{% endif %}>Home</a></li>
                <li><a href="/modes"{% if current_page == 'modes' %} class="active"{% endif %}>Modes</a></li>
                <li><a href="/history"{% if current_page == 'history' %} class="active"{% endif %}>History</a></li>
                <li><a href="/settings"{% if current_page == 'settings' %} class="active"{% endif %}>Settings</a></li>
                <li><a href="/about"{% if current_page == 'about' %} class="active"{% endif %}>About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>OpinionForge v2.0.0 &mdash; An editorial craft engine for AI-assisted opinion writing.</p>
        <p><a href="/about">Disclaimer Policy</a></p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
