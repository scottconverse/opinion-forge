<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OpinionForge{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a href="/" class="brand">OpinionForge</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/modes">Modes</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>OpinionForge v1.0.0 &mdash; An editorial craft engine for AI-assisted opinion writing.</p>
        <p><a href="/about">Disclaimer Policy</a></p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
